name: CI — Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build (placeholder env — real secrets live on Vercel only)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-publishable-key
          SUPABASE_SECRET_KEY: placeholder-secret-key
          CRM_PASSWORD: placeholder-ci-password
          NEXT_PUBLIC_GOOGLE_REVIEW_LINK: https://example.com/review
